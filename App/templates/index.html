<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Notes Summarizer</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    background:#eee;
    padding:15px;
    border-radius:5px;
}

.history{
    margin-top:30px;
}

.history-item{
    background:#fafafa;
    padding:10px;
    margin-top:10px;
    border-left:5px solid #007bff;
}

</style>
</head>

<body>

<div class="container">

<h2>🧠 AI Notes Summarizer</h2>

<textarea id="notes" placeholder="Enter your notes here..."></textarea>

<br>

<button onclick="summarize()">Summarize</button>
<button onclick="loadHistory()">View History</button>

<div class="result" id="summaryResult"></div>

<div class="history" id="history"></div>

</div>


<script>

async function summarize(){

    let text = document.getElementById("notes").value;

    const response = await fetch("http://127.0.0.1:8000/summarize",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            text:text
        })
    });

    const data = await response.json();

    document.getElementById("summaryResult").innerHTML =
        "<h3>Summary:</h3>" + data.summary;
}


async function loadHistory(){

    const response = await fetch("http://127.0.0.1:8000/history");

    const data = await response.json();

    let historyHTML = "<h3>History</h3>";

    data.forEach(item => {
        historyHTML += `
            <div class="history-item">
                <b>Original:</b> ${item.original_text}<br>
                <b>Summary:</b> ${item.summary_text}
            </div>
        `;
    });

    document.getElementById("history").innerHTML = historyHTML;
}

</script>

</body>
</html>
